<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Thexors's Jungle — Downloads</title>
    <link rel="icon" href="/assets/images/Chill-GameLogoStock.png" type="image/png">
    <style>
        :root{--bg:#0f1720;--card:#0b1220;--muted:#9fb3d7}
        html,body{height:100%;margin:0}
        body{display:flex;align-items:center;justify-content:center;background:var(--bg);color:#e6eef8;font-family:Segoe UI,Roboto,Arial,sans-serif}
        .wrap{max-width:920px;padding:28px;width:100%;box-sizing:border-box}
        .card{background:linear-gradient(180deg,rgba(255,255,255,0.02),rgba(255,255,255,0.01));padding:28px;border-radius:16px}
        .header{display:flex;gap:16px;align-items:center}
        .logo{width:64px;height:auto;border-radius:8px}
        .list{margin-top:18px}
        .file{background:#071226;padding:12px;border-radius:10px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
        a.button{background:#0b86ff;color:#fff;padding:8px 12px;border-radius:8px;text-decoration:none;font-weight:600}
        .muted{color:var(--muted)}
    </style>
</head>
<body>
    <div class="wrap">
        <div class="card">
            <div class="header">
                <img class="logo" src="/assets/images/Chill-GameLogoStock.png">
                <div>
                    <div style="font-size:18px">Thexors's Jungle — Downloads</div>
                    <div class="muted" style="font-size:13px">This is where you can download the latest versions of our game </div>
                </div>
            </div>

            <div class="list">
                <div class="file">
                    <div>
                        <div style="font-weight:700">ChillGameLatest.apk</div>
                        <div class="muted" style="font-size:12px">Thexors's Jungle APK</div>
                    </div>
                    <a class="button" href="downloads/chillgame.apk" download>Download</a>
                </div>

                <div class="file">
                    <div>
                        <div style="font-weight:700">Changelog</div>
                    </div>
                    <div class="muted" style="font-size:12px">This is a list of changes made in each version of the game.</div>
                    <p>The game has just been released. No changelog available yet.</p>
                </div>

                <div style="margin-top:12px">
                    <a href="/index.html" class="button" style="background:#334155">Back</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
