<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width,initial-scale=1">
	<title>Thexors's Jungle</title>
	<link rel="icon" href="/assets/images/Chill-GameLogoStock.png" type="image/png">
	<style>
		:root{--bg:#0f1720;--card:#0b1220;--muted:#9fb3d7}
		html,body{height:100%;margin:0}
		body{display:flex;align-items:center;justify-content:center;background:var(--bg);color:#e6eef8;font-family:Segoe UI,Roboto,Arial,sans-serif}
		.wrap{max-width:920px;padding:28px;width:100%;box-sizing:border-box}
		.card{background:linear-gradient(180deg,rgba(255,255,255,0.02),rgba(255,255,255,0.01));padding:28px;border-radius:16px;display:flex;gap:24px;align-items:flex-start}
		.left{text-align:center;min-width:260px}
		.logo{width:220px;height:auto;border-radius:12px;display:block;margin:0 auto;box-shadow:0 10px 30px rgba(2,6,23,0.6)}
		.title{font-size:20px;margin-top:12px}
		.muted{color:var(--muted);margin-top:6px}
		.btn{display:inline-block;margin-top:12px;padding:10px 16px;border-radius:10px;background:#2563eb;color:#fff;text-decoration:none;font-weight:600;box-shadow:0 6px 18px rgba(2,6,23,0.5)}
		.btn:hover{opacity:0.95}
		iframe{border-radius:12px;border:0}
		@media(max-width:720px){.card{flex-direction:column;align-items:center}.left{min-width:0}}
	</style>
</head>
<body>
	<div class="wrap">
		<div class="card">
			<div class="left">
				<img class="logo" src="assets/images/Chill-GameLogoStock.png" alt="Thexors's Jungle Logo">
				<div class="title">Welcome to Thexors's Jungle</div>
				<div class="muted">A Gorilla Tag fan-game made by ThexorsVR (YouTube: ThexorsVR or @com.ThexorsStudios.ChillGameVR
)</div>
				<a class="btn" href="/download/download.html">Download</a>
			</div>
			<div class="right">
				<a class="btn" href="https://discord.gg/swDBdvZqgm">Join Discord Server</a>
				<iframe src="https://discord.com/widget?id=1437888789556101193&theme=dark" width="350" height="500" allowtransparency="true" sandbox="allow-popups allow-popups-to-escape-sandbox allow-same-origin allow-scripts"></iframe>
			</div>
		</div>
	</div>
</body>
</html>
